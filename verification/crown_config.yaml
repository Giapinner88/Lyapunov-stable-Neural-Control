# verification/crown_config.yaml

general:
  device: cuda                 # Khai thác GPU để tăng tốc truyền lan ranh giới (bound propagation)
  timeout: 120                 # Giới hạn thời gian (giây) cho mỗi bước tìm kiếm nhị phân (bisection).
  enable_incomplete_verification: false # Vô hiệu hóa kiểm chứng không đầy đủ, yêu cầu tính xác định nghiêm ngặt.
  loss_reduction_func: max     # Tối đa hóa vi phạm F(x)

model:
  onnx_path: null              # Sẽ được nạp động qua CLI trong bisection.py
  name: FusedLyapunovGraph

specification:
  vnnlib_path: null            # Sẽ được nạp động qua CLI trong bisection.py

solver:
  batch_size: 2048             # Phụ thuộc vào VRAM. Kích thước batch lớn giúp BaB xử lý nhiều miền con cùng lúc.
  bound_prop_method: alpha-crown # Sử dụng alpha-CROWN cho các ràng buộc nới lỏng phi tuyến.
  alpha-crown:
    iteration: 100             # Số vòng lặp tối ưu hóa alpha.
    lr_alpha: 0.1

bab:
  branching:
    method: fsb                # Fast Strict Branching (FSB) hoạt động hiệu quả với các đồ thị điều khiển phi tuyến.
    candidates: 3              # Số lượng nến ứng viên để đánh giá heuristic rẽ nhánh.
  attack:
    pgd_order: skip            # Có thể bỏ qua PGD attack bên trong CROWN nếu vòng lặp CEGIS bên ngoài (synthesis/attacks.py) đã thực hiện tốt.