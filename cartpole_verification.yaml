# Phần 1: Cấu hình chung
general:
  mode: verified-acc

# Phần 2: Cắm não vào cỗ máy
model:
  name: '{"model": "cartpole_state_feedback"}'
  onnx_model_path: verification_results/bab_artifacts/cartpole_verification.onnx

# Phần 3: Cắm bản đồ hình học
specification:
  vnnlib_path: verification_results/bab_artifacts/cartpole_verification.vnnlib

# Phần 4: Chiến thuật Nhánh và Cận (Branch-and-Bound) - Trái tim của bài toán
solver:
  batch_size: 1024
  alpha-crown:
    iteration: 20
    lr_alpha: 0.1
  bab:
    timeout: 300
    branching:
      method: kfsb
      candidates: 5